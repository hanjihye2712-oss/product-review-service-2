# ================================
# 🔥 요청 제한 (Rate Limit) 설정
# ================================
# [유지] IP 기준 요청 제한 (5 req/sec)
limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s;


# ================================
# 🌐 HTTP → HTTPS 리다이렉트
# ================================
server {
    listen 80;
    # [수정] 기존 server_name _; → 실제 도메인으로 변경
    server_name hanjihye.duckdns.org;

    # [유지]
    client_max_body_size 20M;

    # [수정] HTTP 접속은 전부 HTTPS로 돌림
    location / {
        return 301 https://$host$request_uri;
    }
}


# ================================
# 🔐 HTTPS 서버
# ================================
server {
    # [추가] 443 ssl 설정
    listen 443 ssl;
    # [수정] 기존 _ 대신 실제 도메인
    server_name hanjihye.duckdns.org;

    # [유지]
    client_max_body_size 20M;

    # ================================
    # 📜 SSL 인증서 경로
    # ================================
    # [추가] certbot 발급 인증서 연결
    ssl_certificate /etc/letsencrypt/live/hanjihye.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hanjihye.duckdns.org/privkey.pem;

    # [추가] 기본적인 SSL 설정
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # [추가] TLS 버전 제한
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ================================
    # 🔒 보안 헤더 추가
    # ================================
    # [유지] 클릭재킹 방지
    add_header X-Frame-Options "SAMEORIGIN" always;

    # [유지] MIME 타입 공격 방지
    add_header X-Content-Type-Options "nosniff" always;

    # [유지] XSS 방어
    add_header X-XSS-Protection "1; mode=block" always;

    # [유지] referrer 정책
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # [유지] CSP에 jsDelivr CDN 허용 추가
    add_header Content-Security-Policy "default-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://product-review-static.s3.amazonaws.com https://product-review-static.s3.ap-northeast-2.amazonaws.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://product-review-static.s3.amazonaws.com https://product-review-static.s3.ap-northeast-2.amazonaws.com; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https://product-review-static.s3.amazonaws.com https://product-review-static.s3.ap-northeast-2.amazonaws.com https://product-review-media.s3.amazonaws.com https://product-review-media.s3.ap-northeast-2.amazonaws.com; font-src 'self' data: https://product-review-static.s3.amazonaws.com https://product-review-static.s3.ap-northeast-2.amazonaws.com;" always;

    # [추가] HTTPS 강제 알림 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # [유지] nginx 버전 숨김
    server_tokens off;

    # ================================
    # 🚫 공격 경로 차단
    # ================================
    # [유지] PHP 실행 차단
    location ~* \.php$ {
        return 444;
    }

    # [유지] 흔한 공격 경로 차단
    location ~* /(wp-admin|phpunit|vendor|cgi-bin|backup|\.env) {
        return 444;
    }

    # [유지] 숨김파일 접근 차단
    location ~ /\. {
        deny all;
    }

    # ================================
    # 📁 static 파일
    # ================================
    location /static/ {
        # [유지] 기존 alias 유지
        alias /app/staticfiles/;
    }

    # ================================
    # 📁 media 파일
    # ================================
    location /media/ {
        # [유지] 기존 alias 유지
        alias /app/media/;
    }

    # ================================
    # 🤖 FastAPI 서버
    # ================================
    location /ai/ {
        # [유지]
        proxy_pass http://fastapi-server:8001/;

        # [유지]
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # [추가] Django/FastAPI가 HTTPS 원본 요청임을 알 수 있게 전달
        proxy_set_header X-Forwarded-Proto $scheme;

        # [유지]
        limit_req zone=one burst=10 nodelay;
    }

    # ================================
    # 🌐 Django 서버
    # ================================
    location / {
        # [유지]
        proxy_pass http://drf-web:8000;

        # [유지]
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # [추가] Django가 https 요청으로 인식하도록 전달
        proxy_set_header X-Forwarded-Proto $scheme;

        # [유지]
        limit_req zone=one burst=10 nodelay;
    }
}